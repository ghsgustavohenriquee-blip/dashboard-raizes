<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raízes — Dashboard de Mídias Sociais</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde:        #566C2F;
    --verde-light:  #728F42;
    --verde-pale:   #EFF4E8;
    --dourado:      #BFA26E;
    --dourado-light:#D4BC92;
    --dourado-pale: #F8F3EB;
    --bordo:        #6C1E2C;
    --bordo-light:  #8C2E3E;
    --bordo-pale:   #F5EEF0;
    --preto:        #1A1209;
    --branco:       #FDFAF5;
    --cinza:        #F0EBE1;
    --texto:        #2E1F0A;
    --texto-mid:    #5C4220;
    --shadow:       rgba(108,30,44,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--branco); color:var(--texto); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

  /* LOADING */
  #loading-overlay {
    position:fixed; inset:0; background:var(--preto); z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    transition: opacity 0.5s ease;
  }
  #loading-overlay.hidden { opacity:0; pointer-events:none; }
  .loading-logo { font-family:'Playfair Display',serif; font-size:42px; color:var(--dourado-light); letter-spacing:-1px; }
  .loading-bar-track { width:260px; height:3px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
  .loading-bar-fill { height:100%; width:0; background:linear-gradient(90deg,var(--bordo),var(--dourado),var(--verde)); border-radius:2px; transition:width 0.3s ease; }
  .loading-text { font-size:11px; color:rgba(253,250,245,.4); letter-spacing:2px; text-transform:uppercase; }

  /* STATUS */
  #status-bar {
    background:var(--verde); color:#fff; font-size:11px; font-weight:600; letter-spacing:1px;
    text-align:center; padding:7px 20px; text-transform:uppercase;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  #status-bar.error { background:var(--bordo); }
  #status-bar.updating { background:var(--dourado); color:var(--preto); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#fff; display:inline-block; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* HEADER */
  header { background:linear-gradient(135deg,var(--bordo) 0%,#4A1220 60%,#2E0B15 100%); padding:0; position:relative; overflow:hidden; }
  header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(191,162,110,.14) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 10% 80%,rgba(86,108,47,.18) 0%,transparent 60%); pointer-events:none; }
  .header-inner { max-width:1240px; margin:0 auto; padding:36px 52px 32px; display:flex; align-items:center; justify-content:space-between; gap:32px; position:relative; z-index:1; }
  .logo-wrap svg { width:210px; height:auto; display:block; }
  .lc1 { fill:#D4BC92; } .lc2 { fill:#FDFAF5; }
  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .header-period { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--dourado-light); letter-spacing:-.3px; }
  .header-sub { font-size:12px; font-weight:300; color:rgba(253,250,245,.5); letter-spacing:2px; text-transform:uppercase; }
  .header-pills { display:flex; gap:8px; margin-top:4px; }
  .header-pill { background:rgba(191,162,110,.2); border:1px solid rgba(191,162,110,.35); color:var(--dourado-light); font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:4px 12px; border-radius:20px; }
  .header-bar { height:4px; background:linear-gradient(90deg,var(--bordo) 0%,var(--dourado) 40%,var(--verde) 100%); }

  /* NAV */
  .nav-tabs { background:var(--preto); display:flex; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid rgba(191,162,110,.15); }
  .nav-tabs::-webkit-scrollbar { display:none; }
  .tab-btn { background:none; border:none; color:rgba(253,250,245,.45); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; padding:17px 28px; cursor:pointer; transition:all .22s; white-space:nowrap; border-bottom:3px solid transparent; }
  .tab-btn:hover { color:var(--dourado-light); }
  .tab-btn.active { color:var(--dourado); border-bottom-color:var(--dourado); background:rgba(191,162,110,.06); }

  /* MAIN */
  main { max-width:1240px; margin:0 auto; padding:44px 52px; }
  @media(max-width:768px){ main { padding:24px 20px; } .header-inner { padding:24px 20px; flex-direction:column; align-items:flex-start; } }
  .section { display:none; }
  .section.active { display:block; }

  /* SECTION TITLE */
  .section-title { display:flex; align-items:center; gap:14px; margin-bottom:34px; }
  .section-title h2 { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--bordo); letter-spacing:-.3px; }
  .pill { background:var(--verde); color:#fff; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:4px 12px; border-radius:20px; }

  /* KPI */
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(175px,1fr)); gap:18px; margin-bottom:36px; }
  .kpi-card { background:#fff; border-radius:16px; padding:22px 20px; box-shadow:0 2px 18px var(--shadow); position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; }
  .kpi-card:hover { transform:translateY(-3px); box-shadow:0 8px 28px var(--shadow); }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; border-radius:16px 16px 0 0; }
  .kpi-card.verde::before  { background:linear-gradient(90deg,var(--verde),var(--verde-light)); }
  .kpi-card.dourado::before{ background:linear-gradient(90deg,#A08950,var(--dourado-light)); }
  .kpi-card.bordo::before  { background:linear-gradient(90deg,var(--bordo),var(--bordo-light)); }
  .kpi-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--texto-mid); margin-bottom:10px; opacity:.75; }
  .kpi-value { font-family:'Playfair Display',serif; font-size:34px; font-weight:700; color:var(--preto); line-height:1; margin-bottom:6px; }
  .kpi-delta { font-size:12px; font-weight:500; display:flex; align-items:center; gap:4px; }
  .kpi-delta.up   { color:var(--verde); }
  .kpi-delta.down { color:var(--bordo); }
  .kpi-delta.neu  { color:var(--texto-mid); }

  /* CHARTS */
  .chart-row { display:grid; grid-template-columns:1fr 1fr; gap:22px; margin-bottom:28px; }
  @media(max-width:768px){ .chart-row { grid-template-columns:1fr; } }
  .chart-card { background:#fff; border-radius:16px; padding:26px 28px; box-shadow:0 2px 18px var(--shadow); }
  .chart-card h3 { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--bordo); margin-bottom:20px; }
  .chart-card h3 span { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:400; color:var(--texto-mid); margin-left:7px; }
  .chart-card-full { background:#fff; border-radius:16px; padding:26px 28px; box-shadow:0 2px 18px var(--shadow); margin-bottom:28px; }
  .chart-card-full h3 { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--bordo); margin-bottom:20px; }

  /* BARS */
  .bar-chart { display:flex; flex-direction:column; gap:11px; }
  .bar-row { display:flex; align-items:center; gap:11px; }
  .bar-label { font-size:12px; font-weight:600; color:var(--texto-mid); width:52px; text-align:right; flex-shrink:0; }
  .bar-track { flex:1; background:var(--cinza); border-radius:6px; height:28px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; display:flex; align-items:center; justify-content:flex-end; padding-right:10px; font-size:11px; font-weight:700; color:#fff; transition:width 1.1s cubic-bezier(.22,.61,.36,1); min-width:44px; }
  .bar-fill.verde   { background:linear-gradient(90deg,var(--verde),var(--verde-light)); }
  .bar-fill.dourado { background:linear-gradient(90deg,#A08950,var(--dourado-light)); }
  .bar-fill.bordo   { background:linear-gradient(90deg,var(--bordo),var(--bordo-light)); }

  /* TABLE */
  .comp-table { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }
  .comp-table thead th { background:var(--bordo); color:var(--dourado-light); font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:13px 16px; text-align:left; }
  .comp-table thead th:first-child { border-radius:10px 0 0 0; }
  .comp-table thead th:last-child  { border-radius:0 10px 0 0; }
  .comp-table tbody tr { background:#fff; transition:background .15s; }
  .comp-table tbody tr:hover { background:var(--dourado-pale); }
  .comp-table tbody tr:nth-child(even) { background:var(--cinza); }
  .comp-table tbody tr:nth-child(even):hover { background:var(--dourado-pale); }
  .comp-table td { padding:12px 16px; border-bottom:1px solid rgba(191,162,110,.15); color:var(--texto-mid); vertical-align:middle; }
  .comp-table td:first-child { color:var(--preto); font-weight:600; }
  .badge { display:inline-flex; align-items:center; gap:3px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge.up   { background:var(--verde-pale);  color:var(--verde); }
  .badge.down { background:var(--bordo-pale);  color:var(--bordo); }
  .badge.same { background:var(--dourado-pale); color:#8A6A30; }

  /* POST CARDS */
  .posts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:20px; margin-bottom:32px; }
  .post-card { background:#fff; border-radius:16px; box-shadow:0 2px 18px var(--shadow); overflow:hidden; transition:transform .2s,box-shadow .2s; }
  .post-card:hover { transform:translateY(-4px); box-shadow:0 10px 32px var(--shadow); }
  .post-header { padding:17px 20px 14px; border-bottom:1px solid rgba(191,162,110,.15); display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .post-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; color:var(--preto); line-height:1.35; flex:1; }
  .post-format { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; flex-shrink:0; }
  .fmt-reels    { background:var(--bordo-pale);  color:var(--bordo); }
  .fmt-feed     { background:var(--verde-pale);  color:var(--verde); }
  .fmt-carrossel{ background:var(--dourado-pale); color:#8A6A30; }
  .fmt-story    { background:#EAF0F8; color:#2A5F8A; }
  .post-stats { display:grid; grid-template-columns:repeat(3,1fr); padding:15px 20px; gap:10px; }
  .stat-item { text-align:center; }
  .stat-num { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--bordo); display:block; }
  .stat-name { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--texto-mid); display:block; margin-top:2px; }
  .post-footer { padding:11px 20px; background:var(--cinza); display:flex; align-items:center; justify-content:space-between; }
  .post-plat { font-size:11px; font-weight:600; color:var(--texto-mid); letter-spacing:.8px; text-transform:uppercase; }
  .post-link { font-size:11px; color:var(--verde); text-decoration:none; font-weight:700; display:flex; align-items:center; gap:4px; transition:color .2s; }
  .post-link:hover { color:var(--bordo); }
  .month-badge { display:inline-flex; align-items:center; gap:7px; padding:5px 16px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
  .month-badge.fev { background:var(--bordo); color:var(--dourado-light); }
  .month-badge.mar { background:var(--verde); color:#fff; }

  /* INSIGHTS */
  .insights-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(275px,1fr)); gap:18px; margin-bottom:32px; }
  .insight-card { background:#fff; border-radius:16px; padding:22px; box-shadow:0 2px 18px var(--shadow); border-left:4px solid transparent; }
  .insight-card.warn  { border-left-color:var(--dourado); background:#FFFBF4; }
  .insight-card.good  { border-left-color:var(--verde);   background:var(--verde-pale); }
  .insight-card.alert { border-left-color:var(--bordo);   background:var(--bordo-pale); }
  .insight-card.info  { border-left-color:#2A5F8A;        background:#EAF0F8; }
  .insight-icon { font-size:26px; margin-bottom:11px; display:block; }
  .insight-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; color:var(--preto); margin-bottom:7px; }
  .insight-text { font-size:12.5px; color:var(--texto-mid); line-height:1.65; }
  .insight-text strong { color:var(--bordo); font-weight:700; }

  /* PROJEÇÃO */
  .proj-section { background:linear-gradient(135deg,var(--preto) 0%,var(--bordo) 100%); border-radius:20px; padding:40px 44px; color:#fff; margin-bottom:28px; position:relative; overflow:hidden; }
  .proj-section::before { content:''; position:absolute; top:-100px; right:-80px; width:340px; height:340px; border-radius:50%; background:radial-gradient(circle,rgba(191,162,110,.2) 0%,transparent 70%); }
  .proj-section::after  { content:''; position:absolute; bottom:-60px; left:10%; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,rgba(86,108,47,.2) 0%,transparent 70%); }
  .proj-section h2 { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:var(--dourado-light); margin-bottom:6px; position:relative; }
  .proj-sub { font-size:12.5px; color:rgba(253,250,245,.5); margin-bottom:34px; position:relative; font-style:italic; }
  .proj-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:18px; position:relative; }
  .proj-card { background:rgba(253,250,245,.07); border:1px solid rgba(191,162,110,.25); border-radius:14px; padding:22px; transition:background .2s; }
  .proj-card:hover { background:rgba(253,250,245,.12); }
  .proj-month { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--dourado); margin-bottom:16px; }
  .proj-metric { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px; border-bottom:1px solid rgba(255,255,255,.06); padding-bottom:9px; }
  .proj-metric:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .proj-metric-name { font-size:11.5px; color:rgba(255,255,255,.5); }
  .proj-metric-val  { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:#fff; }
  .proj-metric-delta{ font-size:11px; color:var(--dourado-light); }

  /* FB ALERT */
  .fb-alert { background:var(--bordo-pale); border:1.5px solid rgba(108,30,44,.25); border-radius:14px; padding:20px 24px; margin-bottom:26px; display:flex; gap:14px; align-items:flex-start; }
  .fb-alert-icon { font-size:24px; flex-shrink:0; margin-top:2px; }
  .fb-alert-text h4 { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; color:var(--bordo); margin-bottom:5px; }
  .fb-alert-text p { font-size:12.5px; color:var(--texto-mid); line-height:1.65; }

  /* DIVIDER */
  .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(191,162,110,.3),transparent); margin:28px 0; }

  /* FOOTER */
  footer { background:var(--preto); padding:24px 52px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
  .footer-text { font-size:11px; color:rgba(253,250,245,.3); letter-spacing:.5px; text-align:right; }
  .footer-text span { color:var(--dourado); }
  .footer-refresh { background:rgba(191,162,110,.15); border:1px solid rgba(191,162,110,.3); color:var(--dourado-light); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:8px 16px; border-radius:20px; cursor:pointer; transition:all .2s; }
  .footer-refresh:hover { background:rgba(191,162,110,.3); }

  /* ANIMATIONS */
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .section.active>* { animation:fadeUp .42s ease both; }
  .section.active>*:nth-child(2) { animation-delay:.07s; }
  .section.active>*:nth-child(3) { animation-delay:.13s; }
  .section.active>*:nth-child(4) { animation-delay:.19s; }
  .section.active>*:nth-child(5) { animation-delay:.25s; }

  /* SKELETON */
  .skeleton { background:linear-gradient(90deg,#f0ebe1 25%,#fdfaf5 50%,#f0ebe1 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="loading-logo">Raízes</div>
  <div class="loading-bar-track"><div class="loading-bar-fill" id="loading-bar"></div></div>
  <div class="loading-text" id="loading-text">Conectando à planilha…</div>
</div>

<!-- STATUS BAR -->
<div id="status-bar">
  <span class="status-dot"></span>
  <span id="status-text">Carregando dados…</span>
</div>

<header>
  <div class="header-inner">
    <div class="logo-wrap">

<script>
// ============================================================
// CONFIGURAÇÃO — URL da planilha publicada como CSV
// Cada aba da planilha é acessada via gid=NUMERO
// ============================================================
const BASE_URL = 'https://script.google.com/macros/s/AKfycbzZstoeO_p3T2spbCwRnN6buNU0ceM3tO7gpG-x_NcU0SGaVW1WMUAcCPFeNLNqDLzB/exec';

// Cache de dados
let DATA = null;
let lastFetch = null;

// ============================================================
// PARSING CSV
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let inQuote = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQuote = !inQuote; continue; }
      if (line[i] === ',' && !inQuote) { vals.push(cur.trim()); cur = ''; continue; }
      cur += line[i];
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
}

function num(v) {
  if (!v || v === '' || v === '-') return 0;
  return parseFloat(String(v).replace(/[^\d.,\-]/g,'').replace(',','.')) || 0;
}

function fmt(v) {
  const n = num(v);
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'k';
  return String(Math.round(n));
}

function pct(a, b) {
  if (b === 0) return a > 0 ? '+∞' : '—';
  const p = ((a - b) / b * 100);
  return (p >= 0 ? '▲ +' : '▼ ') + Math.abs(p).toFixed(1) + '%';
}

function pctClass(a, b) {
  if (a > b) return 'up';
  if (a < b) return 'down';
  return 'neu';
}

// ============================================================
// BUSCAR DADOS
// ============================================================
async function fetchSheet(gid = '0') {
  const url = `${BASE_URL}?gid=${gid}&cachebust=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);
  const text = await res.text();
  return parseCSV(text);
}

async function loadData(forceRefresh = false) {
  setStatus('updating', '🔄 Atualizando dados da planilha…');
  setLoadingBar(20, 'Conectando ao Google Sheets…');

  try {
    // Tenta buscar a aba principal (gid=0)
    const rows = await fetchSheet('0');
    setLoadingBar(60, 'Processando dados…');

    if (!rows || rows.length === 0) {
      throw new Error('Planilha vazia ou sem dados');
    }

    DATA = processData(rows);
    setLoadingBar(90, 'Renderizando dashboard…');

    renderDashboard(DATA);
    lastFetch = new Date();
    document.getElementById('last-update').textContent = lastFetch.toLocaleTimeString('pt-BR');
    setStatus('ok', `✅ Dados atualizados — ${lastFetch.toLocaleString('pt-BR')}`);
    setLoadingBar(100, 'Pronto!');
    setTimeout(() => hideLoading(), 500);

  } catch (err) {
    console.error('Erro ao carregar dados:', err);
    setStatus('error', `⚠️ Erro ao carregar planilha: ${err.message}. Usando dados de exemplo.`);
    DATA = getFallbackData();
    renderDashboard(DATA);
    setLoadingBar(100, 'Usando dados de exemplo');
    setTimeout(() => hideLoading(), 600);
  }
}

// ============================================================
// PROCESSAR DADOS DA PLANILHA
// A planilha deve ter colunas: Metrica, Fevereiro, Março (ou similar)
// ============================================================
function processData(rows) {
  // Mapear automaticamente as colunas
  const keys = Object.keys(rows[0]);
  console.log('Colunas encontradas:', keys);

  // Descobrir colunas de mês automaticamente
  const metricaCol = keys.find(k => /metrica|metric|indicador|nome/i.test(k)) || keys[0];
  const mesACols = keys.filter(k => /fev|feb|janeiro|jan|mes.?1|m1|anterior|prev/i.test(k));
  const mesBCols = keys.filter(k => /mar|março|março|fevereiro|mes.?2|m2|atual|current/i.test(k));

  const colA = mesACols[0] || keys[1];
  const colB = mesBCols[0] || keys[2];

  console.log(`Coluna métrica: ${metricaCol}, Mês A: ${colA}, Mês B: ${colB}`);

  // Nomes dos meses para o header
  const mesA = colA ? colA.trim() : 'Mês 1';
  const mesB = colB ? colB.trim() : 'Mês 2';

  // Construir objeto de dados
  const d = { mesA, mesB, metricas: {}, posts: [], postsFb: [] };

  // Mapear métricas conhecidas
  const mapeamentos = {
    seguidores_ig: /seguidores.*(instagram|ig)|novos.seg.*ig/i,
    seguidores_fb: /seguidores.*(facebook|fb)|novos.seg.*fb/i,
    alcance_ig: /alcance.*(instagram|ig|total)/i,
    views_ig: /visualiza.*(instagram|ig)/i,
    visitas: /visitas.*perfil|perfil.*visita/i,
    interacoes_ig: /intera.*(instagram|ig)/i,
    views_fb: /visualiza.*(facebook|fb)/i,
    interacoes_fb: /intera.*(facebook|fb)/i,
    cliques: /cliques?.*link|link.*clique/i,
    posts_total: /posts?.*(total|publicad)|total.*posts?/i,
  };

  rows.forEach(row => {
    const metrica = (row[metricaCol] || '').trim();
    if (!metrica) return;

    const vA = num(row[colA]);
    const vB = num(row[colB]);

    // Tentar mapear automaticamente
    let mapeado = false;
    for (const [key, regex] of Object.entries(mapeamentos)) {
      if (regex.test(metrica) && !d.metricas[key]) {
        d.metricas[key] = { label: metrica, a: vA, b: vB };
        mapeado = true;
        break;
      }
    }

    // Se não mapeado, guardar como genérico
    if (!mapeado) {
      const keyGenerico = metrica.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      d.metricas['_raw_' + keyGenerico] = { label: metrica, a: vA, b: vB };
    }
  });

  // Buscar colunas de posts se existirem
  const postRows = rows.filter(r => {
    const v = r[metricaCol] || '';
    return /post|reel|feed|carrossel|story/i.test(v) && !/(total|publicad)/i.test(v);
  });

  // Tentar colunas adicionais para posts
  const colunasTitulo = keys.filter(k => /titulo|post|conteudo|nome/i.test(k) && k !== metricaCol);
  const colunasFormato = keys.filter(k => /formato|tipo|type/i.test(k));
  const colunasAlcance = keys.filter(k => /alcance/i.test(k));
  const colunasViews = keys.filter(k => /view|visuali/i.test(k));
  const colunasLikes = keys.filter(k => /curtida|like|curt/i.test(k));
  const colunasLink = keys.filter(k => /link|url|href/i.test(k));
  const colunasMes = keys.filter(k => /mes|month|periodo/i.test(k));

  return d;
}

function renderProjecao(seg, views, alc, int, vis, label, mult) {
  function range(v, m) {
    const base = Math.round(v * m);
    const lo = Math.round(base * 0.9);
    const hi = Math.round(base * 1.1);
    return `${fmt(lo)}–${fmt(hi)}`;
  }
  const last = v => Math.max(v.a, v.b);
  return `<div class="proj-card">
    <div class="proj-month">📅 ${label}</div>
    <div class="proj-metric"><span class="proj-metric-name">Seguidores Novos</span><div><span class="proj-metric-val">${range(last(seg), mult)}</span></div></div>
    <div class="proj-metric"><span class="proj-metric-name">Visualizações</span><div><span class="proj-metric-val">${range(last(views), mult)}</span></div></div>
    <div class="proj-metric"><span class="proj-metric-name">Alcance Total</span><div><span class="proj-metric-val">${range(last(alc), mult)}</span></div></div>
    <div class="proj-metric"><span class="proj-metric-name">Interações</span><div><span class="proj-metric-val">${range(last(int), mult)}</span></div></div>
    <div class="proj-metric"><span class="proj-metric-name">Visitas ao Perfil</span><div><span class="proj-metric-val">${range(last(vis), mult)}</span></div></div>
  </div>`;
}

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const section = document.getElementById(id);
  if (section) { section.classList.add('active'); animateBars(id); }
  if (btn) btn.classList.add('active');
}

function animateBars(id) {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    el.querySelectorAll('.bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = w; }));
    });
  }, 60);
}

  const bar = document.getElementById('loading-bar');
  const txt = document.getElementById('loading-text');
  if (bar) bar.style.width = pct + '%';
  if (txt) txt.textContent = text;
}

function hideLoading() {
  const overlay = document.getElementById('loading-overlay');
  if (overlay) overlay.classList.add('hidden');
  setTimeout(() => { if (overlay) overlay.style.display = 'none'; }, 500);
}

function setStatus(type, text) {
  const bar = document.getElementById('status-bar');
  const txt = document.getElementById('status-text');
  bar.className = 'status-bar';
  if (type === 'error') bar.id = 'status-bar', bar.className = 'status-bar', bar.style.background = 'var(--bordo)';
  else if (type === 'updating') bar.style.background = 'var(--dourado)', bar.style.color = 'var(--preto)';
  else bar.style.background = 'var(--verde)', bar.style.color = '#fff';
  if (txt) txt.textContent = text;
}

// ============================================================
// AUTO-REFRESH a cada 5 minutos
// ============================================================
setInterval(() => loadData(true), 5 * 60 * 1000);

// Inicializar
window.addEventListener('load', () => loadData());
</script>
